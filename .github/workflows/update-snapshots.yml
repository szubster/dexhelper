name: Update Playwright Snapshots

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  updatesnapshots:
    name: "Update Snapshots"
    # Run only if the comment is on a PR, contains the command, and the author is the repository owner
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '!update-snapshots') &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Add starting reaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Acknowledge the command quickly
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='+1'

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ github.event.issue.number }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Update E2E & CT Snapshots
        run: |
          npm run test:e2e -- --update-snapshots || true
          npm run test:ct -- --update-snapshots || true

      - name: Commit and Push Changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Only stage snapshot files in case test runs left other artifacts
          git add "**/*-snapshots/*"
          
          if git diff --staged --quiet; then
            gh issue comment ${{ github.event.issue.number }} --body "I ran the update command, but no visual changes were detected! 🤷‍♂️"
            exit 0
          fi
          
          git commit -m "test(visual): auto-update playwright snapshots"
          git push

          # Notify the user
          gh issue comment ${{ github.event.issue.number }} --body "✅ Snapshots successfully updated! Please review the latest commit."
