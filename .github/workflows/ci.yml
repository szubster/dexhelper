name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Test
        run: npm test
        
      - name: Type Check
        run: npx tsc --noEmit

      - name: Check Formatting & Linting
        run: npx @biomejs/biome ci .
        
      - name: Build
        run: npm run build
