name: The Foundry Engine

on:
  schedule:
    - cron: '0 * * * *' # Hourly sync
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  orchestrate:
    name: Orchestrate DAG
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24' # Required for --strip-types

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Heartbeat
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --strip-types .github/scripts/foundry-heartbeat.ts

      - name: Run Orchestrator
        id: set-matrix
        run: |
          set +e
          output=$(node --strip-types .github/scripts/foundry-orchestrator.ts --strict 2> orchestrator-err.log | tail -n 1)
          exit_code=${PIPESTATUS[0]}
          set -e
          cat orchestrator-err.log >&2

          # Check for WARN messages indicating unresolvable/circular dependencies.
          if grep -q "WARN" orchestrator-err.log; then
            echo "dag_has_warnings=true" >> $GITHUB_OUTPUT
          fi

          if [ $exit_code -ne 0 ]; then
            # Fail the build for warnings/orchestrator issues as requested
            sh -c "exit $exit_code" || true
            kill -INT $
          fi
          echo "matrix=$output" >> $GITHUB_OUTPUT

      - name: Report DAG Warnings
        if: always() && steps.set-matrix.outputs.dag_has_warnings == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.MY_ISSUES_PAT }}
        run: |
          ISSUE_TITLE="Foundry Engine: DAG Resolution Warnings - ${{ github.run_id }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Use EOF heredoc and multiline string injection for GH issue body to avoid format issues
          {
            echo "The Foundry DAG orchestrator encountered warnings during resolution. This usually means there are missing or circular dependencies in the DAG."
            echo ""
            echo "**Run Details:** [View Action Run]($RUN_URL)"
            echo ""
            echo "**Error Log:**"
            echo '```'
            cat orchestrator-err.log
            echo '```'
          } > issue_body.md

          # Always create a new issue for each warning occurrence
          gh issue create --title "$ISSUE_TITLE" --body-file issue_body.md --label "jules"

      - name: Commit Promotions
        run: |
          # Check for READY state changes promoted by the orchestrator
          if [[ -n $(git status --porcelain .foundry) ]]; then
            git add .foundry
            git commit -m "Foundry: Promote unblocked nodes to READY"
            git pull --rebase origin main
            git push origin main
          else
            echo "No state changes to persist."
          fi

  execute:
    name: Execute Task
    needs: orchestrate
    runs-on: ubuntu-latest
    if: needs.orchestrate.outputs.matrix != '[]' && needs.orchestrate.outputs.matrix != '' && github.ref == 'refs/heads/main'
    strategy:
      max-parallel: 1 # Strictly sequential to prevent git push collisions
      matrix:
        node: ${{ fromJson(needs.orchestrate.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Invoke Jules Agent
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          # 1. Capture task content for the prompt
          task_content=$(cat "${{ matrix.node.repo_path }}")
          
          owner_persona="${{ matrix.node.owner_persona }}"
          agent_file=".github/agents/${owner_persona}.md"

          if [[ -n "$owner_persona" && -f "$agent_file" ]]; then
            agent_context=$(cat "$agent_file")
          else
            agent_context="As the coder of The Foundry, your task is described in the provided node file. You must automatically index and read relevant knowledge from .foundry/docs/knowledge_base/ whenever assigned a task. Follow the schema rules and implementation guidelines."
          fi

          # 2. Construct the prompt JSON
          # source: sources/github/<owner>/<repo>

          # Late Binding check
          if [[ "$owner_persona" == "architect" || "$owner_persona" == "tech_lead" || "$owner_persona" == "story_owner" || "$owner_persona" == "product_manager" ]]; then
            frontmatter_rule="### LATE BINDING PERMISSIONS\nYou are authorized to modify the YAML frontmatter of your node for Late Binding protocols (Wait & Wake, Impossible Loop), such as updating 'depends_on', changing status to PENDING or FAILED, and adding 'rejection_reason'."
          else
            frontmatter_rule="### CRITICAL RULE\nDO NOT modify the YAML frontmatter of the task node. Only update the markdown body (e.g., acceptance criteria checkboxes)."
          fi

          prompt_json=$(jq -n \
            --arg task "$task_content" \
            --arg agent_context "$agent_context" \
            --arg frontmatter_rule "$frontmatter_rule" \
            --arg title "${{ matrix.node.title }}" \
            --arg repo "${{ github.repository }}" \
            --arg schema_url "https://github.com/${{ github.repository }}/blob/main/.foundry/docs/schema.md" \
            '{
              "prompt": "\($agent_context)\n\n\($frontmatter_rule)\n\n### TASK NODE\n\($task)\n\n### SCHEMA\n\($schema_url)",
              "sourceContext": {
                "source": "sources/github/\($repo)",
                "githubRepoContext": {
                  "startingBranch": "main"
                }
              },
              "automationMode": "AUTO_CREATE_PR",
              "title": $title
            }')

          # 3. Request session from Jules API
          echo "Dispatching Jules session for: ${{ matrix.node.id }}"
          response=$(curl -s -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $JULES_API_KEY" \
            -d "$prompt_json")

          # 4. Extract and verify session ID
          session_id=$(echo "$response" | jq -r '.id')
          
          if [[ -z "$session_id" || "$session_id" == "null" ]]; then
            echo "::error::Failed to capture Jules session ID"
            echo "Response: $response"
            exit 1
          fi
          
          echo "SESSION_ID=$session_id" >> $GITHUB_ENV
          echo "Successfully spawned Jules session: $session_id"

      - name: Transition node to ACTIVE
        run: |
          # Transition the file to ACTIVE state and inject the real Jules ID
          node --strip-types .github/scripts/foundry-active.ts "${{ matrix.node.repo_path }}" "$SESSION_ID"

      - name: Commit State Change
        run: |
          git add "${{ matrix.node.repo_path }}"
          git commit -m "Foundry: Transition ${{ matrix.node.id }} -> ACTIVE [$SESSION_ID]"
          git pull --rebase origin main
          git push origin main
