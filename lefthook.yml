# Lefthook configuration
# Refer to https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    validate-foundry-ids:
      run: git diff --name-only --cached --diff-filter=A -- {staged_files} | xargs -r node --experimental-strip-types scripts/validate-foundry-ids.ts
    link-checker:
      run: node --experimental-strip-types scripts/check-links.ts {staged_files}
    biome-check:
      run: pnpm exec biome check --write --error-on-warnings --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
      fail_on_changes: ci
    oxlint:
      run: pnpm exec oxlint --type-aware --no-error-on-unmatched-pattern {staged_files}
    type-check:
      run: pnpm lint
