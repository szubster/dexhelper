# Lefthook configuration
# Refer to https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: pnpm exec biome check --write --error-on-warnings --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      fail_on_changes: ci
    type-check:
      run: pnpm lint
